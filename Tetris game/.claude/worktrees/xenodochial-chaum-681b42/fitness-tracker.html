<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IronLog — Personal Trainer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d0d0d; --bg1: #161616; --bg2: #1e1e1e; --bg3: #262626;
  --accent: #f97316; --accent2: #fb923c; --accentdim: rgba(249,115,22,.15);
  --text: #f5f5f5; --muted: #777; --dim: #444;
  --green: #4ade80; --red: #f87171; --blue: #60a5fa;
  --border: #2a2a2a;
  --chest: #ef4444; --back: #3b82f6; --legs: #22c55e;
  --shoulders: #a855f7; --arms: #f59e0b; --core: #14b8a6;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  max-width: 430px; margin: 0 auto; overflow-x: hidden; }

/* ─── Header ─────────────────────────────── */
header { padding: 16px 18px 0; background: var(--bg); position: sticky; top: 0; z-index: 50; }
.hrow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
.logo em { color: var(--accent); font-style: normal; }
.datebadge { font-size: 11px; color: var(--muted); background: var(--bg2); padding: 4px 10px; border-radius: 20px; }
nav { display: flex; gap: 3px; background: var(--bg2); padding: 3px; border-radius: 12px; }
.navb { flex: 1; padding: 7px 2px 6px; border: none; background: transparent; color: var(--muted);
  font-size: 10px; font-weight: 700; letter-spacing: .3px; border-radius: 9px; cursor: pointer;
  transition: all .18s; text-align: center; text-transform: uppercase; }
.navb span { display: block; font-size: 17px; margin-bottom: 1px; }
.navb.active { background: var(--accent); color: #fff; }

/* ─── Content ────────────────────────────── */
.page { padding: 14px 18px 90px; animation: fadein .2s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ─── Cards ──────────────────────────────── */
.card { background: var(--bg1); border-radius: 16px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.ctitle { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 10px; }

/* ─── Stats grid ─────────────────────────── */
.sgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.sbox { background: var(--bg1); border-radius: 12px; padding: 12px 8px; text-align: center; border: 1px solid var(--border); }
.sval { font-size: 26px; font-weight: 900; }
.slbl { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-top: 1px; }

/* ─── Body part pills ────────────────────── */
.bpgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
.bppill { padding: 11px 6px; border-radius: 12px; text-align: center; cursor: pointer;
  border: 2px solid transparent; transition: all .18s; user-select: none; }
.bppill.sel { border-color: #fff; transform: scale(1.03); }
.bppill.suggested::after { content: '⚡'; font-size: 9px; display: block; }
.bpic { font-size: 22px; display: block; margin-bottom: 3px; }
.bpn { font-size: 11px; font-weight: 800; }
.bpd { font-size: 10px; opacity: .65; }
.bp-chest { background: rgba(239,68,68,.18); color: var(--chest); }
.bp-back { background: rgba(59,130,246,.18); color: var(--back); }
.bp-legs { background: rgba(34,197,94,.18); color: var(--legs); }
.bp-shoulders { background: rgba(168,85,247,.18); color: var(--shoulders); }
.bp-arms { background: rgba(245,158,11,.18); color: var(--arms); }
.bp-core { background: rgba(20,184,166,.18); color: var(--core); }

/* ─── Exercise item ──────────────────────── */
.exitem { background: var(--bg2); border-radius: 12px; padding: 13px; margin-bottom: 7px;
  cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
.exitem.sel { border-color: var(--accent); }
.exname { font-size: 14px; font-weight: 700; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
.chip { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 700; }
.chip-g { background: rgba(74,222,128,.12); color: var(--green); }
.chip-o { background: rgba(249,115,22,.12); color: var(--accent); }
.chip-m { background: rgba(255,255,255,.06); color: var(--muted); }

/* ─── Set logger ─────────────────────────── */
.srow { display: grid; grid-template-columns: 26px 1fr 1fr 38px; gap: 6px; align-items: center; margin-bottom: 6px; }
.snum { font-size: 11px; font-weight: 800; color: var(--muted); text-align: center; }
.sinput { background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 10px 6px; border-radius: 8px; font-size: 15px; font-weight: 700; text-align: center;
  width: 100%; appearance: none; -webkit-appearance: none; }
.sinput:focus { outline: none; border-color: var(--accent); }
.shdrs { display: grid; grid-template-columns: 26px 1fr 1fr 38px; gap: 6px; margin-bottom: 5px; }
.shdr { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--dim); text-align: center; }
.chk { width: 38px; height: 38px; border-radius: 8px; border: 2px solid var(--border);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 17px; transition: all .15s; flex-shrink: 0; }
.chk.done { background: var(--green); border-color: var(--green); color: #fff; }

/* ─── Inputs ─────────────────────────────── */
textarea, .tinput {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 10px 11px; border-radius: 9px;
  font-size: 13px; resize: none; font-family: inherit; line-height: 1.5; }
textarea:focus, .tinput:focus { outline: none; border-color: var(--accent); }
.flbl { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase;
  letter-spacing: .6px; margin: 11px 0 5px; }
select { background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 10px 11px; border-radius: 9px; font-size: 14px; width: 100%;
  appearance: none; cursor: pointer; }
select:focus { outline: none; border-color: var(--accent); }

/* ─── Buttons ────────────────────────────── */
.btn { padding: 13px 18px; border-radius: 12px; border: none; font-size: 14px; font-weight: 800;
  cursor: pointer; transition: all .15s; display: inline-flex; align-items: center;
  justify-content: center; gap: 6px; letter-spacing: .2px; }
.btn:active { transform: scale(.97); }
.btnpri { background: var(--accent); color: #fff; width: 100%; }
.btnpri:hover { background: var(--accent2); }
.btnsec { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
.btnsm { padding: 7px 13px; font-size: 12px; border-radius: 9px; }
.btnout { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btndng { background: rgba(248,113,113,.12); color: var(--red); }
.addrow { display: flex; align-items: center; gap: 7px; padding: 10px 12px; margin-top: 6px;
  background: var(--accentdim); border: 1px dashed rgba(249,115,22,.35); border-radius: 9px;
  color: var(--accent); cursor: pointer; font-size: 13px; font-weight: 700; width: 100%; }

/* ─── Progress bar ───────────────────────── */
.pbar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 10px 0 14px; }
.pfill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }

/* ─── Mini chart ─────────────────────────── */
.mchart { display: flex; align-items: flex-end; gap: 4px; height: 52px; margin-top: 7px; }
.mbar { flex: 1; background: rgba(249,115,22,.25); border-radius: 3px 3px 0 0; min-height: 3px; cursor: default; }
.mbar.latest { background: var(--accent); }

/* ─── Mood ───────────────────────────────── */
.moodrow { display: flex; gap: 6px; }
.moodbtn { flex: 1; padding: 9px; border-radius: 10px; border: 2px solid var(--border);
  background: transparent; font-size: 20px; cursor: pointer; transition: all .15s; }
.moodbtn.sel { border-color: var(--accent); background: var(--accentdim); }

/* ─── History ────────────────────────────── */
.wcard { background: var(--bg1); border-radius: 14px; padding: 14px; margin-bottom: 9px;
  border: 1px solid var(--border); cursor: pointer; }
.wdate { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.wtitle { font-size: 17px; font-weight: 800; }
.wsums { display: flex; gap: 14px; margin-top: 7px; }
.wsum { font-size: 11px; color: var(--muted); }
.wsum strong { color: var(--text); }
.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* ─── Suggest badge ──────────────────────── */
.sbadge { display: inline-flex; align-items: center; gap: 4px; background: var(--accentdim);
  color: var(--accent); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; margin-bottom: 8px; }

/* ─── Empty state ────────────────────────── */
.empty { text-align: center; padding: 44px 20px; color: var(--muted); }
.emptyic { font-size: 46px; margin-bottom: 10px; }
.emptyt { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }

/* ─── Toast ──────────────────────────────── */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); color: var(--text); padding: 11px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 700; border: 1px solid var(--border); z-index: 999;
  opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* ─── Utils ──────────────────────────────── */
.row { display: flex; justify-content: space-between; align-items: center; }
.mt { margin-top: 8px; }
.mb { margin-bottom: 8px; }
.bold { font-weight: 700; }
.sm { font-size: 13px; }
.xs { font-size: 11px; }
.accent { color: var(--accent); }
.green { color: var(--green); }
.muted { color: var(--muted); }
.secttitle { font-size: 19px; font-weight: 900; }
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="logo">Iron<em>Log</em></div>
    <div class="datebadge" id="hdate"></div>
  </div>
  <nav>
    <button class="navb active" onclick="nav('dash')" id="tab-dash"><span>🏠</span>Today</button>
    <button class="navb" onclick="nav('log')"  id="tab-log"><span>➕</span>Log</button>
    <button class="navb" onclick="nav('hist')" id="tab-hist"><span>📋</span>History</button>
    <button class="navb" onclick="nav('prog')" id="tab-prog"><span>📈</span>Progress</button>
  </nav>
</header>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// EXERCISE DATABASE
// ═══════════════════════════════════════════
const DB = {
  chest:     { name:'Chest',     icon:'🏋️', col:'chest',
    ex:['Bench Press','Incline Bench Press','Decline Bench Press','Dumbbell Flyes','Cable Crossover','Push-ups','Chest Dips','Pec Deck Machine'] },
  back:      { name:'Back',      icon:'💪', col:'back',
    ex:['Deadlift','Pull-ups / Chin-ups','Bent-over Barbell Row','Lat Pulldown','Seated Cable Row','T-Bar Row','Single-Arm DB Row','Face Pulls'] },
  legs:      { name:'Legs',      icon:'🦵', col:'legs',
    ex:['Barbell Squat','Leg Press','Romanian Deadlift','Walking Lunges','Leg Curl','Leg Extension','Calf Raises','Hack Squat','Hip Thrust'] },
  shoulders: { name:'Shoulders', icon:'🔝', col:'shoulders',
    ex:['Overhead Press','Dumbbell Lateral Raise','Front Raise','Arnold Press','Rear Delt Fly','Cable Lateral Raise','Upright Row','Barbell Shrugs'] },
  arms:      { name:'Arms',      icon:'💪', col:'arms',
    ex:['Barbell Bicep Curl','Hammer Curl','Preacher Curl','Concentration Curl','Tricep Pushdown','Skull Crushers','Overhead Tricep Extension','Close-Grip Bench','Tricep Dips'] },
  core:      { name:'Core',      icon:'🔥', col:'core',
    ex:['Plank','Crunches','Russian Twists','Hanging Leg Raises','Cable Crunches','Ab Wheel Rollout','Mountain Climbers','Bicycle Crunches'] },
};
const BPS = Object.keys(DB);
const MOODS = ['😫','😕','😐','💪','🔥'];

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
function load() {
  try { return JSON.parse(localStorage.getItem('ironlog') || '[]'); } catch{ return []; }
}
function persist(ws) { localStorage.setItem('ironlog', JSON.stringify(ws)); }
function allWorkouts() { return load(); }
function upsertWorkout(w) {
  const ws = load(); const i = ws.findIndex(x=>x.id===w.id);
  if(i>=0) ws[i]=w; else ws.unshift(w); persist(ws);
}
function removeWorkout(id) { persist(load().filter(w=>w.id!==id)); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

// ═══════════════════════════════════════════
// SUGGESTION ENGINE
// ═══════════════════════════════════════════
function daysSince(d) { if(!d) return 9999; return Math.floor((Date.now()-new Date(d+'T12:00:00').getTime())/86400000); }

function lastTrainedMap() {
  const m = {}; BPS.forEach(bp=>m[bp]=null);
  allWorkouts().forEach(w => { if(w.bodyPart && !m[w.bodyPart]) m[w.bodyPart]=w.date; });
  return m;
}

function suggestedBP() {
  const m = lastTrainedMap();
  return BPS.reduce((best,bp) => daysSince(m[bp]) > daysSince(m[best]) ? bp : best, BPS[0]);
}

function exHistory(name) {
  const out = [];
  allWorkouts().forEach(w => (w.exercises||[]).forEach(ex => {
    if(ex.name===name) out.push({date:w.date,...ex});
  }));
  return out.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function exSuggestion(name) {
  const hist = exHistory(name);
  if(!hist.length) return null;
  const last = hist[0];
  const sets = (last.sets||[]);
  if(!sets.length) return null;
  const done = sets.filter(s=>s.completed);
  const allDone = done.length === sets.length && sets.length > 0;
  const avgW = done.length ? done.reduce((s,x)=>s+(parseFloat(x.weight)||0),0)/done.length : 0;
  const avgR = done.length ? done.reduce((s,x)=>s+(parseInt(x.reps)||0),0)/done.length : 0;
  const lastStr = `${sets.length}×${Math.round(avgR)}${avgW>0?' @ '+avgW+'kg':''}`;

  let sug, sw=avgW, sr=Math.round(avgR), ss=sets.length;
  if(allDone && avgR>=10)      { sw=avgW>0?avgW+2.5:0; sug=`↑ ${sw>0?sw+'kg':'+weight'} × ${sr} reps`; }
  else if(allDone && avgR>=6)  { sr=Math.min(Math.round(avgR)+1,15); sug=`↑ Aim ${sr} reps @ ${avgW>0?avgW+'kg':'same'}`; }
  else                          { sug=`→ Match ${lastStr} first`; }
  return { last:'Last: '+lastStr, sug, ss, sr, sw, date:last.date, allDone };
}

function maxWeight(name) {
  let pr=0;
  exHistory(name).forEach(h=>(h.sets||[]).forEach(s=>{ if(parseFloat(s.weight)>pr) pr=parseFloat(s.weight)||0; }));
  return pr;
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let S = {
  tab: 'dash',
  bp: null,       // selected body part in log
  selEx: [],      // selected exercise names
  wip: null,      // workout in progress
  openEx: 0,      // expanded exercise index in logger
  histOpen: null, // expanded history index
};

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg, ms=2600) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function nav(t) {
  S.tab=t;
  ['dash','log','hist','prog'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));
  render();
}

// ═══════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════
function render() {
  document.getElementById('hdate').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const app = document.getElementById('app');
  if(S.tab==='dash')      app.innerHTML = renderDash();
  else if(S.tab==='log')  app.innerHTML = S.wip ? renderLogger() : renderLogStart();
  else if(S.tab==='hist') app.innerHTML = renderHist();
  else if(S.tab==='prog') app.innerHTML = renderProg();
  bindEvents();
}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function renderDash() {
  const ws = allWorkouts();
  const ltm = lastTrainedMap();
  const sbp = suggestedBP();
  const week = ws.filter(w=>daysSince(w.date)<=7).length;

  // streak
  let streak=0;
  const today = todayStr();
  const dates = [...new Set(ws.map(w=>w.date))].sort((a,b)=>b.localeCompare(a));
  let prev='';
  for(const d of dates){
    const ds=daysSince(d);
    if(!prev && ds<=1) { streak=1; prev=d; }
    else if(prev && daysSince(d)-daysSince(prev)===1) { streak++; prev=d; }
    else if(prev) break;
  }

  let h = `<div class="page">`;

  // Stats
  h += `<div class="sgrid">
    <div class="sbox"><div class="sval accent">${streak}</div><div class="slbl">🔥 Streak</div></div>
    <div class="sbox"><div class="sval">${week}</div><div class="slbl">This Week</div></div>
    <div class="sbox"><div class="sval">${ws.length}</div><div class="slbl">Total</div></div>
  </div>`;

  // Today's suggestion
  const daysAgo = daysSince(ltm[sbp]);
  h += `<div class="card">
    <div class="ctitle">Today's Recommendation</div>
    <div class="sbadge">⚡ Suggested</div>
    <div style="font-size:28px;font-weight:900;margin-bottom:3px">${DB[sbp].icon} ${DB[sbp].name}</div>
    <div class="xs muted">${ltm[sbp] ? `Last trained ${daysAgo} day${daysAgo!==1?'s':''} ago` : 'Never trained — start here!'}</div>
    <div class="mt">
      <button class="btn btnpri btnsm" onclick="startWO('${sbp}')">Start ${DB[sbp].name} Workout →</button>
    </div>
  </div>`;

  // Overview
  h += `<div class="card"><div class="ctitle">Muscle Group Status</div><div class="bpgrid">`;
  BPS.forEach(bp=>{
    const d=daysSince(ltm[bp]);
    const lbl=!ltm[bp]?'Never':d===0?'Today':d===1?'Yesterday':`${d}d ago`;
    const op=!ltm[bp]?1:d>=7?.95:d>=4?.7:d>=2?.5:.35;
    const isSugg = bp===sbp;
    h += `<div class="bppill bp-${bp}${isSugg?' suggested':''}" style="opacity:${op}" onclick="startWO('${bp}')">
      <span class="bpic">${DB[bp].icon}</span>
      <div class="bpn">${DB[bp].name}</div>
      <div class="bpd">${lbl}</div>
    </div>`;
  });
  h += `</div></div>`;

  // Last workout
  const last = ws[0];
  if(last) {
    const vol = calcVol(last);
    h += `<div class="card">
      <div class="row mb"><div class="ctitle" style="margin:0">Last Workout</div>
        <button class="btn btnout btnsm" onclick="nav('hist')">See All</button></div>
      <div class="bold" style="font-size:16px">${DB[last.bodyPart]?.icon||''} ${DB[last.bodyPart]?.name||last.bodyPart}</div>
      <div class="xs muted mt">${fmtDate(last.date)}</div>
      <div class="wsums">
        <div class="wsum"><strong>${(last.exercises||[]).length}</strong> exercises</div>
        <div class="wsum"><strong>${totalSets(last)}</strong> sets</div>
        <div class="wsum"><strong>${vol.toLocaleString()}</strong>kg volume</div>
        ${last.mood?`<div class="wsum">${MOODS[last.mood-1]}</div>`:''}
      </div>
    </div>`;
  }

  h += `</div>`;
  return h;
}

// ═══════════════════════════════════════════
// LOG — STEP 1: choose body part + exercises
// ═══════════════════════════════════════════
function renderLogStart() {
  const sbp = suggestedBP();
  let h = `<div class="page"><div class="row mb" style="margin-bottom:14px">
    <div class="secttitle">Log Workout</div></div>
    <div class="flbl" style="margin-top:0">Choose Muscle Group</div>
    <div class="bpgrid" style="margin-bottom:14px">`;

  BPS.forEach(bp=>{
    const sel=S.bp===bp;
    h += `<div class="bppill bp-${bp} ${sel?'sel':''} ${bp===sbp?'suggested':''}" onclick="selBP('${bp}')">
      <span class="bpic">${DB[bp].icon}</span>
      <div class="bpn">${DB[bp].name}</div>
    </div>`;
  });
  h += `</div>`;

  if(S.bp) {
    const bp=S.bp;
    h += `<div class="card">
      <div class="ctitle">${DB[bp].icon} ${DB[bp].name} — Pick Exercises</div>
      <div class="xs muted mb" style="margin-bottom:8px">Tap to select. Suggestions based on your history.</div>`;

    DB[bp].ex.forEach(name=>{
      const sel=S.selEx.includes(name);
      const sg=exSuggestion(name);
      const esc=name.replace(/'/g,"\\'");
      h += `<div class="exitem${sel?' sel':''}" onclick="toggleEx('${esc}')">
        <div class="row"><div class="exname">${name}</div><div style="font-size:17px">${sel?'✅':'○'}</div></div>`;
      if(sg) h += `<div class="chips">
        <span class="chip chip-m">${sg.last}</span>
        <span class="chip chip-g">${sg.sug}</span>
      </div>`;
      h += `</div>`;
    });
    h += `</div>`;

    if(S.selEx.length>0) {
      h += `<button class="btn btnpri" onclick="beginWO()">
        Start Workout — ${S.selEx.length} exercise${S.selEx.length>1?'s':''} →
      </button>`;
    }
  }

  h += `</div>`;
  return h;
}

// ═══════════════════════════════════════════
// LOG — STEP 2: active workout logger
// ═══════════════════════════════════════════
function renderLogger() {
  const w = S.wip;
  const ts = w.exercises.reduce((s,ex)=>s+(ex.sets?.length||0),0);
  const ds = w.exercises.reduce((s,ex)=>s+(ex.sets?.filter(x=>x.completed).length||0),0);
  const pct = ts>0?(ds/ts)*100:0;

  let h = `<div class="page">
    <div class="row" style="margin-bottom:10px">
      <div>
        <div class="secttitle">${DB[w.bodyPart]?.icon} ${DB[w.bodyPart]?.name}</div>
        <div class="xs muted">${ds}/${ts} sets complete</div>
      </div>
      <button class="btn btndng btnsm" onclick="cancelWO()">✕ Cancel</button>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>`;

  w.exercises.forEach((ex,ei)=>{
    const open=S.openEx===ei;
    const doneHere=ex.sets.filter(s=>s.completed).length;
    const sg=exSuggestion(ex.name);
    h += `<div class="card" style="margin-bottom:9px">
      <div class="row" onclick="openEx(${ei})" style="cursor:pointer">
        <div>
          <div class="bold">${ex.name}</div>
          <div class="xs muted">${doneHere}/${ex.sets.length} sets</div>
        </div>
        <div style="font-size:16px">${open?'▲':'▼'}</div>
      </div>`;
    if(sg) h += `<div class="chips mt"><span class="chip chip-m">${sg.last}</span><span class="chip chip-g">${sg.sug}</span></div>`;
    if(open) h += renderExLogger(ex,ei);
    h += `</div>`;
  });

  h += `<div class="card">
    <div class="ctitle" style="margin-bottom:8px">Session Wrap-up</div>
    <div class="flbl" style="margin-top:0">How did it feel?</div>
    <div class="moodrow">
      ${[1,2,3,4,5].map(m=>`<button class="moodbtn${w.mood===m?' sel':''}" onclick="setMood(${m})">${MOODS[m-1]}</button>`).join('')}
    </div>
    <div class="flbl">Overall Notes</div>
    <textarea rows="2" placeholder="How was the session?" id="wnotes" onchange="setWNotes(this.value)">${w.overallNotes||''}</textarea>
  </div>

  <button class="btn btnpri" onclick="finishWO()">✅ Save Workout</button>
  </div>`;
  return h;
}

function renderExLogger(ex,ei) {
  let h = `<div style="margin-top:12px">
    <div class="shdrs">
      <div class="shdr">Set</div><div class="shdr">kg</div><div class="shdr">Reps</div><div class="shdr">✓</div>
    </div>`;

  ex.sets.forEach((set,si)=>{
    h += `<div class="srow">
      <div class="snum">${si+1}</div>
      <input class="sinput" type="number" inputmode="decimal" step="0.5" min="0"
        placeholder="kg" value="${set.weight??''}"
        onchange="updSet(${ei},${si},'weight',this.value)">
      <input class="sinput" type="number" inputmode="numeric" min="0"
        placeholder="reps" value="${set.reps??''}"
        onchange="updSet(${ei},${si},'reps',this.value)">
      <button class="chk${set.completed?' done':''}" onclick="togSet(${ei},${si})">${set.completed?'✓':''}</button>
    </div>`;
  });

  h += `<button class="addrow" onclick="addSet(${ei})">+ Add Set</button>

    <div class="flbl">Notes</div>
    <textarea rows="2" placeholder="e.g. felt strong, full ROM…"
      onchange="updExField(${ei},'notes',this.value)">${ex.notes||''}</textarea>

    <div class="flbl">What Worked</div>
    <textarea rows="2" placeholder="e.g. wider grip, pause at bottom…"
      onchange="updExField(${ei},'whatWorked',this.value)">${ex.whatWorked||''}</textarea>

    <div class="flbl">Suggestions for Next Time</div>
    <textarea rows="2" placeholder="e.g. increase weight by 2.5kg…"
      onchange="updExField(${ei},'nextSugg',this.value)">${ex.nextSugg||''}</textarea>
  </div>`;
  return h;
}

// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
function renderHist() {
  const ws = allWorkouts();
  let h = `<div class="page">
    <div class="row" style="margin-bottom:14px">
      <div class="secttitle">History</div>
      <div class="xs muted">${ws.length} sessions</div>
    </div>`;

  if(!ws.length) h += `<div class="empty">
    <div class="emptyic">📋</div>
    <div class="emptyt">No workouts yet</div>
    <div class="xs">Log your first session to see history</div>
  </div>`;

  ws.forEach((w,i)=>{
    const open=S.histOpen===i;
    const vol=calcVol(w);
    h += `<div class="wcard" onclick="togHist(${i})">
      <div class="wdate">${fmtDate(w.date)}</div>
      <div class="row">
        <div class="wtitle">${DB[w.bodyPart]?.icon||''} ${DB[w.bodyPart]?.name||w.bodyPart}</div>
        ${w.mood?`<div style="font-size:20px">${MOODS[w.mood-1]}</div>`:''}
      </div>
      <div class="wsums">
        <div class="wsum"><strong>${(w.exercises||[]).length}</strong> exercises</div>
        <div class="wsum"><strong>${totalSets(w)}</strong> sets</div>
        <div class="wsum"><strong>${vol.toLocaleString()}</strong>kg vol</div>
      </div>
      ${open?renderHistDetail(w,i):''}
    </div>`;
  });

  h += `</div>`;
  return h;
}

function renderHistDetail(w,wi) {
  let h = `<div class="divider"></div>`;
  (w.exercises||[]).forEach(ex=>{
    const done=(ex.sets||[]).filter(s=>s.completed);
    const vol=done.reduce((s,x)=>(parseFloat(x.weight)||0)*(parseInt(x.reps)||0)+s,0);
    h += `<div style="margin-bottom:10px">
      <div class="bold sm">${ex.name}</div>
      <div class="chips mt">`;
    (ex.sets||[]).forEach(set=>{
      h += `<span class="chip ${set.completed?'chip-g':'chip-m'}">${set.weight||'—'}kg×${set.reps||'—'}</span>`;
    });
    if(vol>0) h += `<span class="chip chip-m">Vol: ${vol}kg</span>`;
    h += `</div>`;
    if(ex.notes)    h += `<div class="xs muted mt">📝 ${ex.notes}</div>`;
    if(ex.whatWorked) h += `<div class="xs green mt">✅ ${ex.whatWorked}</div>`;
    if(ex.nextSugg) h += `<div class="xs accent mt">💡 ${ex.nextSugg}</div>`;
    h += `</div>`;
  });
  if(w.overallNotes) h += `<div class="xs muted">📋 ${w.overallNotes}</div>`;
  h += `<div style="margin-top:10px">
    <button class="btn btndng btnsm" onclick="event.stopPropagation();delWO('${w.id}')">🗑 Delete</button>
  </div>`;
  return h;
}

// ═══════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════
function renderProg() {
  const ws = allWorkouts();
  const map = {};
  ws.forEach(w=>(w.exercises||[]).forEach(ex=>{
    if(!map[ex.name]) map[ex.name]=[];
    const done=(ex.sets||[]).filter(s=>s.completed);
    const vol=done.reduce((s,x)=>(parseFloat(x.weight)||0)*(parseInt(x.reps)||0)+s,0);
    const mw=Math.max(0,...done.map(s=>parseFloat(s.weight)||0));
    map[ex.name].push({date:w.date,vol,mw});
  }));

  let h = `<div class="page"><div class="secttitle" style="margin-bottom:14px">Progress</div>`;

  if(!Object.keys(map).length) h += `<div class="empty">
    <div class="emptyic">📈</div>
    <div class="emptyt">No data yet</div>
    <div class="xs">Complete workouts to track progress</div>
  </div>`;

  BPS.forEach(bp=>{
    const exs=DB[bp].ex.filter(e=>map[e]);
    if(!exs.length) return;
    h += `<div class="card"><div class="ctitle">${DB[bp].icon} ${DB[bp].name}</div>`;
    exs.forEach(name=>{
      const data=map[name].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const last=data[data.length-1];
      const pr=Math.max(...data.map(d=>d.mw));
      const prev=data.length>1?data[data.length-2].vol:null;
      const trend=prev===null?'':last.vol>prev?'↑':last.vol<prev?'↓':'→';
      const tc=trend==='↑'?'var(--green)':trend==='↓'?'var(--red)':'var(--muted)';
      h += `<div style="margin-bottom:14px">
        <div class="row">
          <div class="bold sm">${name}</div>
          <div style="color:${tc};font-weight:800;font-size:13px">${trend} ${data.length} sessions</div>
        </div>
        <div class="chips mt">
          <span class="chip chip-o">PR: ${pr>0?pr+'kg':'BW'}</span>
          <span class="chip chip-m">Last vol: ${last.vol}kg</span>
        </div>
        ${miniChart(data)}
      </div>`;
    });
    h += `</div>`;
  });
  h += `</div>`;
  return h;
}

function miniChart(data) {
  if(data.length<2) return '';
  const mx=Math.max(...data.map(d=>d.vol),1);
  const pts=data.slice(-8);
  let h=`<div class="mchart">`;
  pts.forEach((d,i)=>{
    const pct=Math.max((d.vol/mx)*100,4);
    const last=i===pts.length-1;
    h+=`<div class="mbar${last?' latest':''}" style="height:${pct}%" title="${d.date}: ${d.vol}kg"></div>`;
  });
  return h+'</div>';
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function selBP(bp)      { S.bp=bp; S.selEx=[]; render(); }
function toggleEx(name) {
  const i=S.selEx.indexOf(name);
  if(i>=0) S.selEx.splice(i,1); else S.selEx.push(name);
  render();
}

function beginWO() {
  if(!S.bp||!S.selEx.length) return;
  S.wip = {
    id: uid(),
    date: todayStr(),
    bodyPart: S.bp,
    mood: null,
    overallNotes: '',
    exercises: S.selEx.map(name=>{
      const sg=exSuggestion(name);
      return {
        name, notes:'', whatWorked:'', nextSugg:'',
        sets: Array.from({length:sg?sg.ss:3},()=>({
          weight: sg&&sg.sw>0?sg.sw:'',
          reps:   sg?sg.sr:10,
          completed:false,
        })),
      };
    }),
  };
  S.openEx=0;
  render();
}

function startWO(bp) {
  S.bp=bp; S.selEx=[]; S.wip=null;
  nav('log');
}

function openEx(i)   { S.openEx = S.openEx===i?-1:i; render(); }
function togHist(i)  { S.histOpen = S.histOpen===i?null:i; render(); }

function updSet(ei,si,field,val) {
  S.wip.exercises[ei].sets[si][field] = field==='reps'?(parseInt(val)||''):(parseFloat(val)||'');
}
function togSet(ei,si) {
  S.wip.exercises[ei].sets[si].completed ^= true; render();
}
function addSet(ei) {
  const sets=S.wip.exercises[ei].sets;
  const last=sets[sets.length-1]||{};
  sets.push({weight:last.weight||'',reps:last.reps||'',completed:false});
  render();
}
function updExField(ei,f,v) { S.wip.exercises[ei][f]=v; }
function setMood(m)   { S.wip.mood=m; render(); }
function setWNotes(v) { S.wip.overallNotes=v; }

function finishWO() {
  const done=S.wip.exercises.reduce((s,ex)=>s+ex.sets.filter(x=>x.completed).length,0);
  if(!done && !confirm('No sets marked complete. Save anyway?')) return;
  upsertWorkout(S.wip);
  S.wip=null; S.bp=null; S.selEx=[];
  toast('💪 Workout saved!');
  nav('hist');
}

function cancelWO() {
  if(!confirm('Discard this workout?')) return;
  S.wip=null; render();
}

function delWO(id) {
  if(!confirm('Delete this workout?')) return;
  removeWorkout(id);
  S.histOpen=null;
  toast('Deleted');
  render();
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function todayStr() { return new Date().toISOString().split('T')[0]; }

function fmtDate(d) {
  const today=todayStr();
  const yest=new Date(Date.now()-86400000).toISOString().split('T')[0];
  if(d===today) return 'Today';
  if(d===yest)  return 'Yesterday';
  return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function totalSets(w) { return (w.exercises||[]).reduce((s,ex)=>s+(ex.sets?.length||0),0); }

function calcVol(w) {
  return (w.exercises||[]).reduce((t,ex)=>
    t+(ex.sets||[]).reduce((s,set)=>
      set.completed?(parseFloat(set.weight)||0)*(parseInt(set.reps)||0)+s:s, 0), 0);
}

function bindEvents() { /* event delegation handled via inline onclick */ }

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
render();
</script>
